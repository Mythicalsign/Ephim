name: LLaMA Main Server

on:
  workflow_dispatch:
    inputs:
      worker1_ip:
        description: 'Worker 1 Tailscale IP (required)'
        required: true
        type: string
      worker2_ip:
        description: 'Worker 2 Tailscale IP (required)'
        required: true
        type: string
      worker3_ip:
        description: 'Worker 3 Tailscale IP (required)'
        required: true
        type: string
      worker4_ip:
        description: 'Worker 4 Tailscale IP (optional)'
        required: false
        type: string
      worker5_ip:
        description: 'Worker 5 Tailscale IP (optional)'
        required: false
        type: string
      worker6_ip:
        description: 'Worker 6 Tailscale IP (optional)'
        required: false
        type: string
      worker7_ip:
        description: 'Worker 7 Tailscale IP (optional)'
        required: false
        type: string
      worker8_ip:
        description: 'Worker 8 Tailscale IP (optional)'
        required: false
        type: string
      worker9_ip:
        description: 'Worker 9 Tailscale IP (optional)'
        required: false
        type: string
      worker10_ip:
        description: 'Worker 10 Tailscale IP (optional)'
        required: false
        type: string
      duration_minutes:
        description: 'How long to keep the server alive (minutes)'
        required: true
        default: '300'

jobs:
  main-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      RPC_PORT: "50052"
      SERVER_PORT: "8080"
      API_KEY: "sk-local-llama"
      MODEL_REPO: "unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF"
      MODEL_FILE: "Qwen3-Coder-30B-A3B-Instruct-Q4_K_M.gguf"
      MODEL_DIR: "/home/runner/models"

    steps:
      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            git \
            curl \
            wget \
            jq \
            python3 \
            python3-pip \
            iproute2 \
            netcat-openbsd \
            ca-certificates

      - name: Build llama.cpp with RPC support
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          cd llama.cpp
          cmake -S . -B build -G Ninja -DGGML_RPC=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel "$(nproc)"

      - name: Verify binaries exist
        shell: bash
        run: |
          set -euxo pipefail
          cd llama.cpp
          ls -la build/bin/
          for bin in llama-server ggml-rpc-server; do
            if [ ! -x "./build/bin/$bin" ]; then
              echo "Could not find $bin binary"
              exit 1
            fi
          done
          echo "LLAMA_BIN=$(pwd)/build/bin" >> "$GITHUB_ENV"

      - name: Install Tailscale
        shell: bash
        run: |
          set -euxo pipefail
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale network
        shell: bash
        run: |
          set -euxo pipefail
          sudo tailscale up \
            --authkey "${{ secrets.TAILSCALE_AUTHKEY }}" \
            --hostname="llama-main-${{ github.run_id }}" \
            --accept-routes \
            --reset \
            --timeout=30s

          for i in {1..30}; do
            MAIN_IP="$(tailscale ip -4 2>/dev/null || true)"
            if [ -n "$MAIN_IP" ]; then
              echo "MAIN_IP=$MAIN_IP" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 2
          done

          echo "Tailscale IPv4 was not assigned in time"
          exit 1

      - name: Collect and validate active workers
        shell: bash
        env:
          WORKER1_IP: ${{ inputs.worker1_ip }}
          WORKER2_IP: ${{ inputs.worker2_ip }}
          WORKER3_IP: ${{ inputs.worker3_ip }}
          WORKER4_IP: ${{ inputs.worker4_ip }}
          WORKER5_IP: ${{ inputs.worker5_ip }}
          WORKER6_IP: ${{ inputs.worker6_ip }}
          WORKER7_IP: ${{ inputs.worker7_ip }}
          WORKER8_IP: ${{ inputs.worker8_ip }}
          WORKER9_IP: ${{ inputs.worker9_ip }}
          WORKER10_IP: ${{ inputs.worker10_ip }}
        run: |
          set -euo pipefail
          ACTIVE_WORKERS=()
          SEEN='|'

          for idx in $(seq 1 10); do
            var="WORKER${idx}_IP"
            ip="${!var:-}"
            if [ -z "$ip" ]; then
              continue
            fi
            if [[ "$SEEN" == *"|$ip|"* ]]; then
              echo "Duplicate worker IP detected: $ip"
              exit 1
            fi
            ACTIVE_WORKERS+=("$ip")
            SEEN="${SEEN}${ip}|"
          done

          if [ "${#ACTIVE_WORKERS[@]}" -lt 3 ]; then
            echo "This workflow requires at least 3 worker IPs."
            exit 1
          fi

          ACTIVE_ENDPOINTS=()
          for ip in "${ACTIVE_WORKERS[@]}"; do
            ACTIVE_ENDPOINTS+=("${ip}:${RPC_PORT}")
          done

          ACTIVE_WORKER_IPS_JOINED="$(IFS=,; echo "${ACTIVE_WORKERS[*]}")"
          ACTIVE_WORKER_ENDPOINTS_JOINED="$(IFS=,; echo "${ACTIVE_ENDPOINTS[*]}")"

          {
            echo "ACTIVE_WORKER_COUNT=${#ACTIVE_WORKERS[@]}"
            echo "ACTIVE_WORKER_IPS=$ACTIVE_WORKER_IPS_JOINED"
            echo "ACTIVE_WORKER_ENDPOINTS=$ACTIVE_WORKER_ENDPOINTS_JOINED"
          } >> "$GITHUB_ENV"

      - name: Verify workers are reachable on RPC port
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a WORKERS <<< "$ACTIVE_WORKER_IPS"

          check_worker() {
            local ip="$1"
            echo "Checking ${ip}:${RPC_PORT} ..."
            for i in {1..60}; do
              if nc -z -w 3 "${ip}" "${RPC_PORT}" 2>/dev/null; then
                echo "${ip}:${RPC_PORT} is reachable"
                return 0
              fi
              echo "  Attempt $i/60 failed, retrying in 5s..."
              sleep 5
            done
            echo "Timed out waiting for ${ip}:${RPC_PORT}"
            return 1
          }

          for ip in "${WORKERS[@]}"; do
            check_worker "$ip"
          done

      - name: Install hf CLI
        shell: bash
        run: |
          set -euxo pipefail
          pip install --break-system-packages "huggingface_hub[hf_xet]"
          echo "HF_XET_HIGH_PERFORMANCE=1" >> "$GITHUB_ENV"

      - name: Download model from HuggingFace
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euxo pipefail
          mkdir -p "$MODEL_DIR"

          echo "Downloading $MODEL_FILE from $MODEL_REPO ..."
          hf download "$MODEL_REPO" "$MODEL_FILE" \
            --local-dir "$MODEL_DIR" \
            --token "$HF_TOKEN"

          MODEL_PATH="$MODEL_DIR/$MODEL_FILE"

          if [ ! -f "$MODEL_PATH" ]; then
            echo "Model file not found at $MODEL_PATH after download"
            ls -la "$MODEL_DIR/"
            exit 1
          fi

          echo "Model downloaded: $(du -sh "$MODEL_PATH" | cut -f1)"
          echo "MODEL_PATH=$MODEL_PATH" >> "$GITHUB_ENV"

      - name: Start llama-server with RPC workers
        shell: bash
        run: |
          set -euxo pipefail

          echo "Starting llama-server..."
          echo "  Model:     $MODEL_PATH"
          echo "  RPC nodes: $ACTIVE_WORKER_ENDPOINTS"
          echo "  Port:      $SERVER_PORT"

          nohup "$LLAMA_BIN/llama-server" \
            -m "$MODEL_PATH" \
            --rpc "$ACTIVE_WORKER_ENDPOINTS" \
            -c 32768 \
            -np 1 \
            --host 0.0.0.0 \
            --port "$SERVER_PORT" \
            --api-key "$API_KEY" \
            --jinja \
            --no-webui \
            -ngl 0 \
            > /tmp/llama-server.log 2>&1 &

          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          echo "llama-server PID: $SERVER_PID"

          echo "Waiting for server to become ready..."
          for i in {1..120}; do
            if curl -sf \
                -H "Authorization: Bearer $API_KEY" \
                "http://localhost:$SERVER_PORT/v1/models" \
                > /dev/null 2>&1; then
              echo "Server is ready after $i attempts"
              break
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "llama-server exited unexpectedly:"
              cat /tmp/llama-server.log || true
              exit 1
            fi
            sleep 5
          done

          if ! curl -sf \
              -H "Authorization: Bearer $API_KEY" \
              "http://localhost:$SERVER_PORT/v1/models" \
              > /dev/null 2>&1; then
            echo "Server never became ready. Last log:"
            cat /tmp/llama-server.log || true
            exit 1
          fi

      - name: Display connection info
        shell: bash
        run: |
          set -euo pipefail
          echo ""
          echo "========================================"
          echo "  LLAMA SERVER IS LIVE"
          echo ""
          echo "  Model:         $MODEL_FILE"
          echo "  Workers:       $ACTIVE_WORKER_COUNT nodes"
          echo "  Endpoints:     $ACTIVE_WORKER_ENDPOINTS"
          echo ""
          echo "  Tailscale IP:  $MAIN_IP"
          echo "  Base URL:      http://$MAIN_IP:$SERVER_PORT/v1"
          echo "  API Key:       $API_KEY"
          echo ""
          echo "  Cline settings:"
          echo "    Provider:    OpenAI Compatible"
          echo "    Base URL:    http://$MAIN_IP:$SERVER_PORT/v1"
          echo "    API Key:     $API_KEY"
          echo "    Model ID:    $MODEL_FILE"
          echo ""
          echo "  Health check:"
          echo "    curl -H \"Authorization: Bearer $API_KEY\" \\"
          echo "         http://$MAIN_IP:$SERVER_PORT/v1/models"
          echo "========================================"
          echo ""

      - name: Keep server alive and monitor health
        shell: bash
        run: |
          set -euo pipefail
          DURATION=${{ github.event.inputs.duration_minutes }}
          echo "Server will run for up to ${DURATION} minutes."
          echo "Cancel this workflow run to shut it down early."
          echo ""

          END_TIME=$((SECONDS + DURATION * 60))
          TICK=0

          while [ "$SECONDS" -lt "$END_TIME" ]; do
            sleep 30
            TICK=$((TICK + 1))

            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "llama-server stopped unexpectedly. Last log:"
              tail -n 40 /tmp/llama-server.log || true
              exit 1
            fi

            # Log a heartbeat every 10 minutes
            if [ $((TICK % 20)) -eq 0 ]; then
              REMAINING=$(( (END_TIME - SECONDS) / 60 ))
              echo "[ $(date -u '+%H:%M:%S') ] Server healthy. ~${REMAINING}m remaining."
              echo "  Base URL: http://$MAIN_IP:$SERVER_PORT/v1"
              echo "  API Key:  $API_KEY"
            fi
          done

          echo "Duration reached. Shutting down gracefully."

      - name: Cleanup on exit
        if: always()
        shell: bash
        run: |
          set +e
          echo "Shutting down..."
          kill "$SERVER_PID" 2>/dev/null || true
          pkill -f 'llama-server' || true
          sudo tailscale down || true
