name: LLaMA Main Server

on:
  workflow_dispatch:
    inputs:
      worker1_ip:
        description: 'Worker 1 Tailscale IP (e.g. 100.x.x.x)'
        required: true
        type: string
      worker2_ip:
        description: 'Worker 2 Tailscale IP (e.g. 100.x.x.x)'
        required: true
        type: string
      api_key:
        description: 'API key for securing the server'
        required: true
        type: string
        default: 'sk-devstral-local'
      ctx_size:
        description: 'Context size (keep at 32768 unless you know you have more RAM)'
        required: true
        type: string
        default: '32768'

jobs:
  main-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git wget curl iproute2 netcat-openbsd

      - name: Build llama.cpp with RPC support
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          cd llama.cpp
          cmake -B build -DGGML_RPC=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Verify server binary exists
        run: |
          cd llama.cpp
          ls -la build/bin/
          if [ ! -x ./build/bin/llama-server ]; then
            echo "Could not find llama-server binary"
            exit 1
          fi

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale network
        run: |
          sudo tailscale up \
            --authkey ${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=llama-main-${{ github.run_id }} \
            --accept-routes

          for i in {1..30}; do
            MAIN_IP=$(tailscale ip -4 2>/dev/null || true)
            if [ -n "$MAIN_IP" ]; then
              echo "MAIN_IP=$MAIN_IP" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 2
          done

          echo "Tailscale IPv4 was not assigned in time"
          exit 1

      - name: Display main server Tailscale IP
        run: |
          echo ""
          echo "========================================"
          echo "  MAIN SERVER TAILSCALE IP"
          echo "  $MAIN_IP"
          echo "========================================"
          echo ""

      - name: Download Devstral model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd llama.cpp
          mkdir -p models

          echo "Downloading Devstral-Small-2507-Q6_K.gguf (~19GB)..."
          echo "Started at: $(date)"

          if [ -n "$HF_TOKEN" ]; then
            echo "Using authenticated download..."
            wget --header="Authorization: Bearer $HF_TOKEN" \
                 --progress=dot:giga \
                 -O models/Devstral-Small-2507-Q6_K.gguf \
                 "https://huggingface.co/unsloth/Devstral-Small-2507-GGUF/resolve/main/Devstral-Small-2507-Q6_K.gguf"
          else
            echo "WARNING: No HF_TOKEN found. Anonymous downloads may be throttled."
            wget --progress=dot:giga \
                 -O models/Devstral-Small-2507-Q6_K.gguf \
                 "https://huggingface.co/unsloth/Devstral-Small-2507-GGUF/resolve/main/Devstral-Small-2507-Q6_K.gguf"
          fi

          echo ""
          echo "Download finished at: $(date)"
          ls -lh models/

      - name: Verify workers are reachable on RPC port
        run: |
          check_worker() {
            local ip="$1"
            echo "Checking $ip:50052 ..."
            for i in {1..60}; do
              if nc -z -w 2 "$ip" 50052; then
                echo "$ip:50052 is reachable"
                return 0
              fi
              sleep 5
            done
            echo "Timed out waiting for $ip:50052"
            return 1
          }

          check_worker "${{ inputs.worker1_ip }}"
          check_worker "${{ inputs.worker2_ip }}"

      - name: Start llama server with RPC and wait for health
        run: |
          cd llama.cpp

          echo ""
          echo "========================================"
          echo "  STARTING LLAMA SERVER"
          echo "  Model: Devstral-Small-2507-Q6_K.gguf"
          echo "  Workers: ${{ inputs.worker1_ip }}:50052, ${{ inputs.worker2_ip }}:50052"
          echo "  API Key: ${{ inputs.api_key }}"
          echo "  Context: ${{ inputs.ctx_size }}"
          echo "  Parallel slots: 1"
          echo "========================================"
          echo ""

          nohup ./build/bin/llama-server \
            -m models/Devstral-Small-2507-Q6_K.gguf \
            --rpc ${{ inputs.worker1_ip }}:50052,${{ inputs.worker2_ip }}:50052 \
            -c ${{ inputs.ctx_size }} \
            -np 1 \
            --cache-type-k q8_0 \
            --cache-type-v q8_0 \
            --cache-ram 0 \
            --threads $(nproc) \
            --threads-batch $(nproc) \
            --host 0.0.0.0 \
            --port 8080 \
            --api-key "${{ inputs.api_key }}" \
            --jinja \
            --no-webui \
            -ngl 0 > /tmp/llama-server.log 2>&1 &

          LLAMA_PID=$!
          echo "LLAMA_PID=$LLAMA_PID"

          echo "Waiting for server health endpoint..."
          for i in {1..120}; do
            if curl -fsS http://127.0.0.1:8080/health >/tmp/llama-health.json; then
              echo "Server health check succeeded"
              break
            fi
            if ! kill -0 "$LLAMA_PID" 2>/dev/null; then
              echo "llama-server exited early"
              cat /tmp/llama-server.log || true
              exit 1
            fi
            sleep 5
          done

          if ! curl -fsS http://127.0.0.1:8080/health >/tmp/llama-health.json; then
            echo "Server never became healthy"
            cat /tmp/llama-server.log || true
            exit 1
          fi

          echo ""
          echo "Last server log lines:"
          tail -n 40 /tmp/llama-server.log || true
          echo ""
          echo "========================================"
          echo "  SERVER IS RUNNING"
          echo ""
          echo "  API Endpoint: http://$MAIN_IP:8080"
          echo "  Health Check: http://$MAIN_IP:8080/health"
          echo ""
          echo "  Configure Cline with:"
          echo "  Base URL: http://$MAIN_IP:8080/v1"
          echo "  API Key: ${{ inputs.api_key }}"
          echo "  Model: devstral-small-2507"
          echo ""
          echo "  Test with:"
          echo "  curl http://$MAIN_IP:8080/v1/models \\\n            -H \"Authorization: Bearer ${{ inputs.api_key }}\""
          echo ""
          echo "  This server will run for ~6 hours"
          echo "========================================"
          echo ""

          sleep 21540

      - name: Cleanup on exit
        if: always()
        run: |
          echo "Shutting down server..."
          pkill -f llama-server || true
          sudo tailscale down || true
