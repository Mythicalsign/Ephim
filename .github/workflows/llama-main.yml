name: LLaMA Main Server

on:
  workflow_dispatch:
    inputs:
      worker1_ip:
        description: 'Worker 1 Tailscale IP (required)'
        required: true
        type: string
      worker2_ip:
        description: 'Worker 2 Tailscale IP (required)'
        required: true
        type: string
      worker3_ip:
        description: 'Worker 3 Tailscale IP (required)'
        required: true
        type: string
      worker4_ip:
        description: 'Worker 4 Tailscale IP (optional)'
        required: false
        type: string
      worker5_ip:
        description: 'Worker 5 Tailscale IP (optional)'
        required: false
        type: string
      worker6_ip:
        description: 'Worker 6 Tailscale IP (optional)'
        required: false
        type: string
      worker7_ip:
        description: 'Worker 7 Tailscale IP (optional)'
        required: false
        type: string
      worker8_ip:
        description: 'Worker 8 Tailscale IP (optional)'
        required: false
        type: string
      worker9_ip:
        description: 'Worker 9 Tailscale IP (optional)'
        required: false
        type: string
      worker10_ip:
        description: 'Worker 10 Tailscale IP (optional)'
        required: false
        type: string
      duration_minutes:
        description: 'How long to keep the runner alive (minutes)'
        required: true
        default: '60'

jobs:
  main-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      RPC_PORT: "50052"
      SERVER_PORT: "8080"

    steps:
      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends             build-essential             cmake             ninja-build             git             curl             wget             jq             python3             python3-pip             iproute2             netcat-openbsd             ca-certificates             openssh-server

      - name: Build llama.cpp with RPC support
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          cd llama.cpp
          cmake -S . -B build -G Ninja -DGGML_RPC=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel "$(nproc)"

      - name: Verify binaries exist
        shell: bash
        run: |
          set -euxo pipefail
          cd llama.cpp
          ls -la build/bin/
          if [ ! -x ./build/bin/llama-server ]; then
            echo "Could not find llama-server binary"
            exit 1
          fi
          if [ ! -x ./build/bin/llama-rpc-server ]; then
            echo "Could not find llama-rpc-server binary"
            exit 1
          fi
          if [ ! -x ./build/bin/llama-gguf-split ]; then
            echo "Could not find llama-gguf-split binary"
            exit 1
          fi

      - name: Install Tailscale
        shell: bash
        run: |
          set -euxo pipefail
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale network
        shell: bash
        run: |
          set -euxo pipefail
          sudo tailscale up             --authkey "${{ secrets.TAILSCALE_AUTHKEY }}"             --hostname="llama-main-${{ github.run_id }}"             --accept-routes

          for i in {1..30}; do
            MAIN_IP="$(tailscale ip -4 2>/dev/null || true)"
            if [ -n "$MAIN_IP" ]; then
              echo "MAIN_IP=$MAIN_IP" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 2
          done

          echo "Tailscale IPv4 was not assigned in time"
          exit 1

      - name: Collect and validate active workers
        shell: bash
        env:
          WORKER1_IP: ${{ inputs.worker1_ip }}
          WORKER2_IP: ${{ inputs.worker2_ip }}
          WORKER3_IP: ${{ inputs.worker3_ip }}
          WORKER4_IP: ${{ inputs.worker4_ip }}
          WORKER5_IP: ${{ inputs.worker5_ip }}
          WORKER6_IP: ${{ inputs.worker6_ip }}
          WORKER7_IP: ${{ inputs.worker7_ip }}
          WORKER8_IP: ${{ inputs.worker8_ip }}
          WORKER9_IP: ${{ inputs.worker9_ip }}
          WORKER10_IP: ${{ inputs.worker10_ip }}
        run: |
          set -euo pipefail
          ACTIVE_WORKERS=()
          SEEN='|'

          for idx in $(seq 1 10); do
            var="WORKER${idx}_IP"
            ip="${!var:-}"
            if [ -z "$ip" ]; then
              continue
            fi
            if [[ "$SEEN" == *"|$ip|"* ]]; then
              echo "Duplicate worker IP detected: $ip"
              exit 1
            fi
            ACTIVE_WORKERS+=("$ip")
            SEEN="${SEEN}${ip}|"
          done

          if [ "${#ACTIVE_WORKERS[@]}" -lt 3 ]; then
            echo "This workflow requires at least 3 worker IPs."
            exit 1
          fi

          ACTIVE_ENDPOINTS=()
          for ip in "${ACTIVE_WORKERS[@]}"; do
            ACTIVE_ENDPOINTS+=("${ip}:${RPC_PORT}")
          done

          ACTIVE_WORKER_IPS_JOINED="$(IFS=,; echo "${ACTIVE_WORKERS[*]}")"
          ACTIVE_WORKER_ENDPOINTS_JOINED="$(IFS=,; echo "${ACTIVE_ENDPOINTS[*]}")"

          {
            echo "ACTIVE_WORKER_COUNT=${#ACTIVE_WORKERS[@]}"
            echo "ACTIVE_WORKER_IPS=$ACTIVE_WORKER_IPS_JOINED"
            echo "ACTIVE_WORKER_ENDPOINTS=$ACTIVE_WORKER_ENDPOINTS_JOINED"
          } >> "$GITHUB_ENV"

      - name: Verify workers are reachable on RPC port
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a WORKERS <<< "$ACTIVE_WORKER_IPS"

          check_worker() {
            local ip="$1"
            echo "Checking ${ip}:${RPC_PORT} ..."
            for i in {1..60}; do
              if nc -z -w 2 "$ip" "$RPC_PORT"; then
                echo "${ip}:${RPC_PORT} is reachable"
                return 0
              fi
              sleep 5
            done
            echo "Timed out waiting for ${ip}:${RPC_PORT}"
            return 1
          }

          for ip in "${WORKERS[@]}"; do
            check_worker "$ip"
          done

      - name: Setup SSH server
        shell: bash
        run: |
          set -euxo pipefail

          # Enable passwordless sudo for runner user
          echo "runner ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/runner-nopasswd
          sudo chmod 440 /etc/sudoers.d/runner-nopasswd

          # Start SSH
          sudo service ssh start

          echo "SSH server is available on port 22 via Tailscale IP"

      - name: Display connection info
        shell: bash
        run: |
          set -euxo pipefail
          echo ""
          echo "========================================"
          echo "  LLAMA MAIN SERVER IS READY"
          echo ""
          echo "  Tailscale IP: $MAIN_IP"
          echo "  Hostname:     llama-main-${{ github.run_id }}"
          echo ""
          echo "  llama.cpp location: ~/work/llama.cpp/llama.cpp"
          echo "  Binaries:           ~/work/llama.cpp/llama.cpp/build/bin/"
          echo ""
          echo "  Active workers: $ACTIVE_WORKER_COUNT"
          echo "  Worker endpoints: $ACTIVE_WORKER_ENDPOINTS"
          echo ""
          echo "  SSH into the runner:"
          echo "    tailscale ssh runner@$MAIN_IP"
          echo ""
          echo "  Or use hostname:"
          echo "    tailscale ssh runner@llama-main-${{ github.run_id }}"
          echo ""
          echo "  The 'runner' user password is empty."
          echo "  Use key auth or sudo without password."
          echo ""
          echo "  To start the server manually, SSH in and run:"
          echo "    cd ~/work/llama.cpp/llama.cpp"
          echo "    ./build/bin/llama-server -m /path/to/model.gguf \"
          echo "      --rpc $ACTIVE_WORKER_ENDPOINTS \"
          echo "      -c 32768 -np 1 --host 0.0.0.0 --port 8080 \"
          echo "      --api-key sk-local-llama --jinja --no-webui -ngl 0"
          echo ""
          echo "  To start a local RPC worker on this machine:"
          echo "    ./build/bin/llama-rpc-server -H 0.0.0.0 -p 50052"
          echo "========================================"
          echo ""

      - name: Keep runner alive
        shell: bash
        run: |
          set -euxo pipefail
          DURATION=${{ github.event.inputs.duration_minutes }}
          echo "Keeping runner alive for ${DURATION} minutes..."
          echo "Cancel this workflow to terminate the runner early."

          for ((i=0; i<DURATION*60; i++)); do
            sleep 1
          done

      - name: Cleanup on exit
        if: always()
        shell: bash
        run: |
          set +e
          echo "Shutting down..."
          sudo tailscale down || true
